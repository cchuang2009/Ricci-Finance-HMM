[market]
tickers = ["NVDA", "AMD", "AVGO", "TSM", "MU", "MRVL", "ANET", "AAOI", "COHR", "LITE"]
period = "5y"
interval = "1d"

[graph]
window_size = 63
step = 5
max_frames = 60
graph_mode = "knn+bridges"
k_neighbors = 3
min_corr = 0.05
max_bridges = 3
capital_alpha = 0.35

[ricci]
alpha = 0.5
method = "OTD"
proc = 1

[regime]
states = 3
primary_engine = "hmmlearn-viterbi"
compare_all = true

[visualization]
z_mode = "ricci_stress"
show_ticker_names = true
show_edge_values = true
edge_value = "ricci"
labeled_edges = 20
